name: kumpas
description: "Filipino Sign Language Learning App with Real-time AI Feedback"
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.0
  
  # Camera & Media
  camera: ^0.10.5
  image: ^4.0.0
  
  # TFLite Model Inference
  tflite_flutter: ^0.10.0
  
  # UI & Design
  google_fonts: ^6.1.0
  
  # Utilities
  equatable: ^2.0.5
  http: ^1.6.0

  # Video playback (dictionary sign demos)
  video_player: ^2.9.1

  # Authentication
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/dictionary_videos/
